##########################################################################
## Minimal GAMBIT configuration for testing the paraprof scanner plugin.
##
## Uses the 2D NormalDist toy model in ExampleBit_A so the scan stays cheap.
##
## Run with (1 master + 3 worker ranks):
##
##     mpirun -n 4 ./gambit -f yaml_files/paraprof_test.yaml
##
## The paraprof plugin requires >=2 MPI ranks.
##########################################################################


Parameters:
  NormalDist:
    mu:
      prior_type: flat
      range: [15.0, 30.0]
    sigma:
      prior_type: flat
      range: [0.0, 5.0]


Priors:
  # None needed; flat priors are specified above.


Printer:
  printer: hdf5
  options:
    output_file: "paraprof_test.hdf5"
    group: "/data"
    delete_file_on_restart: true
    buffer_length: 1000


Scanner:

  use_scanner: paraprof

  scanners:

    paraprof:
      plugin: paraprof
      like: LogLike
      run:
        # One 2D projection over the full parameter space, plus two 1D
        # projections. Small grids keep the test quick.
        projections:
          - dims: ["NormalDist::mu", "NormalDist::sigma"]
            grid_points: [12, 12]
            optimization_method: de
          - dims: ["NormalDist::mu"]
            grid_points: [25]
          - dims: ["NormalDist::sigma"]
            grid_points: [25]
        # Light paraprof tuning suitable for a fast smoke test.
        roi_threshold: 4.0
        pop_per_grid_point: 3
        n_initial_optimizations: 20
        max_patching_waves: 5
        lbfgsb_max_iter: 20
        lbfgsb_polish: true
        use_clustering: false
        refinement_direct_eval: false
        save_plots: false


ObsLikes:

  - purpose:      LogLike
    capability:   normaldist_loglike
    module:       ExampleBit_A
    type:         double


Rules:

  - if:
      capability: normaldist_loglike
    then:
      options:
        probability_of_validity: 1.0


Logger:

  redirection:
    [Default]      : "default.log"
    [ExampleBit_A] : "ExampleBit_A.log"
    [Scanner]      : "Scanner.log"
  debug: true


KeyValues:

  debug: false

  default_output_path: "${PWD}/runs/paraprof_test"

  print_scanID: true
  scanID: 1

  rng:
    generator: ranlux48
    seed: -1

  print_timing_data: false
  print_unitcube: true

  likelihood:
    model_invalid_for_lnlike_below: -1e6
    use_lnlike_modifier: identity
